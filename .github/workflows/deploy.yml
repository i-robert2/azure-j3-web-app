name: deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write # for PR preview URL comments

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build + Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          # Exposed to the Astro build as import.meta.env.PUBLIC_APPINSIGHTS_CONNECTION_STRING
          PUBLIC_APPINSIGHTS_CONNECTION_STRING: ${{ vars.APP_INSIGHTS_CONNECTION_STRING }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "site"
          output_location: "dist"

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"

  # Lighthouse runs post-merge against the production SWA hostname.
  # (PR-preview Lighthouse is unreliable because the preview URL is only
  # published as a PR comment by the SWA action, not as a job output.)
  lighthouse:
    needs: build_and_deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Lighthouse CI
    steps:
      - uses: actions/checkout@v4
      - name: Wait for deployment to settle
        run: sleep 45
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://${{ vars.SWA_HOSTNAME }}/
            https://${{ vars.SWA_HOSTNAME }}/projects/
            https://${{ vars.SWA_HOSTNAME }}/contact/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.github/lighthouserc.json
